default:
  # 运行模式，可选 debug 和 release，默认是 release
  mode: debug
  # 服务监听端口
#  listen: 8091
  # jwt 签名的 key
  jwt_key: pixiu
  # true: 同账号仅允许单人在线；false: 允许多人同时在线
  single_login: true
  # 自动创建指定模型的数据库表结构，不会更新已存在的数据库表
  auto_migrate: true
  # 日志的格式，可选 text 和 json（作用于 HTTP/任务等 logrus 日志）
  log_format: json
  # 日志级别，可选 error / info / debug（作用于 HTTP/任务等 logrus 日志）
  log_level: info
  # klog 详细级别，等价于命令行 -v；未配置时默认 0。
  # 若同时传了 -v，以命令行为准。
  # verbosity: 2

  # 超级管理初始化用户名和密码，默认为 admin/Pixiu123456!
  admin_user: admin
  admin_password: Pixiu123456!

  # CloudShell/工具容器镜像
#  toolbox: ccr.ccs.tencentyun.com/pixiucloud/helm-toolbox:v3.9.0

# 配置 http 和 https， 默认 http，
# 启用https的时候 cert_file 和 key_file 为必填
#tls:
#  enable: false
#  cert_file: test.pem
#  key_file: test.key

# 数据库地址信息
mysql:
  host: peng
  user: root
  password: Pixiu868686
  port: 3306
  name: pixiu

worker:
  # 默认是 /etc/pixiu, 如果指定则需要修改挂载路径
#  work_dir: /etc/pixiu
  engines:
    - image: ccr.ccs.tencentyun.com/pixiucloud/kubez-ansible:v2.0.2
      os_supported:
        - centos7
        - debian10
        - ubuntu18.04
    - image: ccr.ccs.tencentyun.com/pixiucloud/kubez-ansible:v3.0.3
      os_supported:
        - debian11
        - ubuntu20.04
        - ubuntu22.04
        - rocky8.5
        - rocky9.2
        - rocky9.3
        - openEuler22.03
        - openEuler24.03
