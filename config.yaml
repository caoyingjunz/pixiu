default:
  # 运行模式，可选 debug 和 release，默认是 release
  # mode: debug
  # 服务监听端口
  listen: 8080
  # jwt 签名的 key
  jwt_key: pixiu
  # 自动创建指定模型的数据库表结构，不会更新已存在的数据库表
  auto_migrate: true
  # 日志的格式，可选 text 和 json
  log_format: json
  log_level: info

  # 超级管理初始化用户名和密码，默认为 admin/Pixiu123456!
  admin_user: admin
  admin_password: Pixiu123456!

# 配置 http 和 https， 默认 http，
# 启用https的时候 cert_file 和 key_file 为必填
#tls:
#  enable: false
#  cert_file: test.pem
#  key_file: test.key

# 数据库地址信息
mysql:
  host: localhost
  user: root
  password: root
  port: 3306
  name: pixiu

worker:
  # 默认是 /etc/pixiu, 如果指定则需要修改挂载路径
#  work_dir: /etc/pixiu
  engines:
    - image: ccr.ccs.tencentyun.com/pixiucloud/kubez-ansible:v2.0.2
      os_supported:
        - centos7
        - debian10
        - ubuntu18.04
    - image: ccr.ccs.tencentyun.com/pixiucloud/kubez-ansible:v3.0.2
      os_supported:
        - debian11
        - ubuntu20.04
        - ubuntu22.04
        - rocky8.5
        - rocky9.2
        - rocky9.3
        - openEuler22.03
        - openEuler24.03
